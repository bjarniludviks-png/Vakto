<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAKTO — Stimpilklukka</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f6; --panel:#fff; --ink:#1a1a1f; --ink2:#5f6470; --ink3:#9296a6; --line:#e6e6e9; --line2:#f3f3f5;
  --brand:#e9700f; --brand-2:#f59331; --brand-deep:#cf5f0c; --brand-soft:#fdf1e6;
  --good:#1f9d6b; --good-soft:#e8f5ef; --bad:#d8483a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"General Sans","Plus Jakarta Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;letter-spacing:-.011em;min-height:100vh}
.top{display:flex;align-items:center;gap:13px;padding:20px 30px;background:var(--panel);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px}
.brand .m{display:flex;align-items:center;justify-content:center}
.brand .m svg{width:27px;height:27px;display:block}
.brand b{font-size:17px;font-weight:700;letter-spacing:.04em;color:var(--ink)}
.top .co{font-size:13px;color:var(--ink3);font-weight:600;border-left:1px solid var(--line);padding-left:13px}
.top .sp{flex:1}
.clock{text-align:right}
.clock .t{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.clock .d{font-size:12px;color:var(--ink3)}

.wrap{max-width:1100px;margin:0 auto;padding:38px 24px 60px;text-align:center}
.wrap h1{font-size:26px;font-weight:700;letter-spacing:-.03em}
.wrap .sub{font-size:14px;color:var(--ink2);margin-top:6px;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px 12px;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.tile:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:0 8px 20px rgba(20,22,28,.08)}
.tile:active{transform:translateY(0)}
.tile .av{width:62px;height:62px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:21px}
.tile .nm{font-size:15px;font-weight:600;margin-top:13px}
.tile .st{font-size:12px;font-weight:600;margin-top:7px;padding:3px 11px;border-radius:999px;display:inline-block}
.st.in{background:var(--good-soft);color:var(--good)} .st.out{background:var(--line2);color:var(--ink3)}

/* overlay */
.ov{display:none;position:fixed;inset:0;z-index:50;align-items:center;justify-content:center;padding:24px;background:rgba(20,22,28,.45);backdrop-filter:blur(3px)}
.ov.show{display:flex}
.card{background:var(--panel);border-radius:24px;padding:34px 30px;text-align:center;max-width:380px;width:100%;box-shadow:0 24px 60px rgba(20,22,28,.3);animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.card .av{width:84px;height:84px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:30px}
.card .nm{font-size:22px;font-weight:700;margin-top:16px;letter-spacing:-.02em}
.card .cur{font-size:14px;color:var(--ink2);margin-top:6px}
.card .big{width:100%;border:none;font:inherit;font-size:17px;font-weight:700;padding:16px;border-radius:14px;cursor:pointer;margin-top:24px;color:#fff}
.big.cin{background:var(--good);box-shadow:0 8px 20px rgba(31,157,107,.3)}
.big.cout{background:var(--bad);box-shadow:0 8px 20px rgba(216,72,58,.3)}
.card .cancel{margin-top:12px;background:none;border:none;font:inherit;font-size:14px;font-weight:600;color:var(--ink3);cursor:pointer;padding:8px}
.dots{display:flex;gap:15px;justify-content:center;margin:20px 0 4px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--line);transition:.1s}
.dot.f{background:var(--brand);border-color:var(--brand)}
.dots.shake{animation:shk .5s}
@keyframes shk{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
.pin-err{color:var(--bad);font-size:13px;font-weight:600;height:18px;margin-bottom:6px}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.pad button{font:inherit;font-size:22px;font-weight:600;padding:15px 0;border-radius:14px;border:1px solid var(--line);background:var(--panel);cursor:pointer;color:var(--ink)}
.pad button:hover{background:var(--line2)} .pad button:active{background:var(--brand-soft);border-color:var(--brand)}
.pad button.muted{font-size:14px;font-weight:600;color:var(--ink3)}
.hint{font-size:11.5px;color:var(--ink3);margin-top:15px}.hint b{color:var(--brand)}

/* success flash */
.flash{display:none;position:fixed;inset:0;z-index:60;align-items:center;justify-content:center;background:rgba(20,22,28,.5);backdrop-filter:blur(3px)}
.flash.show{display:flex}
.flash .fc{background:var(--panel);border-radius:24px;padding:40px 38px;text-align:center;box-shadow:0 24px 60px rgba(20,22,28,.3);animation:pop .2s ease}
.flash .ring{width:84px;height:84px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center}
.ring.in{background:var(--good-soft)} .ring.out{background:#fdecea}
.flash .ring svg{width:42px;height:42px;stroke-width:2.6}
.ring.in svg{stroke:var(--good)} .ring.out svg{stroke:var(--bad)}
.flash .ft{font-size:21px;font-weight:700;letter-spacing:-.02em}
.flash .fs{font-size:14px;color:var(--ink2);margin-top:6px}
.foot{text-align:center;color:var(--ink3);font-size:12.5px;padding:18px;border-top:1px solid var(--line);background:var(--panel)}
@media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr)}.clock .t{font-size:18px}}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><div class="m"><svg viewBox="0 0 28 28" fill="none"><rect x="3" y="15" width="5.4" height="10" rx="1.6" fill="var(--brand-2)"/><rect x="11.3" y="9" width="5.4" height="16" rx="1.6" fill="var(--brand)"/><rect x="19.6" y="3" width="5.4" height="22" rx="1.6" fill="var(--brand-deep)"/></svg></div><b>VAKTO</b></div>
  <div class="co">Kaffi Krónan</div>
  <div class="sp"></div>
  <div class="clock"><div class="t" id="clock">14:32:07</div><div class="d" id="date">þriðjudagur 24. júní 2026</div></div>
</div>

<div class="wrap">
  <h1>Stimpilklukka</h1>
  <div class="sub">Smelltu á nafnið þitt til að stimpla inn eða út.</div>
  <div class="grid" id="grid"></div>
</div>
<div class="foot">VAKTO · Stimpilklukka — opnaðu þessa síðu á sameiginlegri tölvu eða spjaldtölvu á vinnustaðnum.</div>

<div class="ov" id="ov"><div class="card" id="ovcard"></div></div>
<div class="flash" id="flash"><div class="fc" id="flashc"></div></div>

<script>
const EMP=[
 ['MÍ','Mína Huong','#e9700f',true,'08:02','4731'],['BA','Bach Luu','#1f9d6b',false,'—','2208'],
 ['PH','Phong Ha','#0891b2',true,'07:56','9054'],['ÓM','Ómar S.','#d8483a',false,'—','1190'],
 ['HA','Ha Vu','#7c6ff2',true,'09:01','6677'],['DA','Dalya R.','#ca8a04',false,'—','3321'],
 ['JÓ','Jón G.','#db2777',false,'—','8080'],['TR','Truong Vu','#0f766e',true,'11:00','5512'],
 ['MO','Moon M.','#2563eb',false,'—','7140'],['NG','Ngoan Thi','#16a34a',true,'08:00','4499'],
 ['FA','Fannar F.','#9333ea',false,'—','1357'],['LO','Lolo','#e11d48',false,'—','2468']
];
const KST={}, KIN={};
EMP.forEach(e=>{KST[e[1]]= e[3]===true; KIN[e[1]]=e[4];});
let CURN='', PIN='';

function render(){
  document.getElementById('grid').innerHTML=EMP.map(e=>{
    const on=KST[e[1]];
    return `<div class="tile" onclick="open_('${e[1]}')"><div class="av" style="background:${e[2]}">${e[0]}</div><div class="nm">${e[1]}</div><div class="st ${on?'in':'out'}">${on?'Á vakt':'Ekki á vakt'}</div></div>`;
  }).join('');
}
function emp(n){return EMP.find(e=>e[1]===n);}
function open_(n){
  CURN=n; PIN=''; const e=emp(n), on=KST[n];
  document.getElementById('ovcard').innerHTML=`
    <div class="av" style="background:${e[2]}">${e[0]}</div>
    <div class="nm">${n}</div>
    <div class="cur">${on?('Á vakt síðan '+KIN[n]+' — sláðu inn kóða til að stimpla út'):'Sláðu inn 4-stafa kóðann þinn'}</div>
    <div class="dots" id="dots">${dots()}</div>
    <div class="pin-err" id="pinerr"></div>
    <div class="pad">${[1,2,3,4,5,6,7,8,9].map(d=>`<button onclick="key('${d}')">${d}</button>`).join('')}<button class="muted" onclick="closeOv()">Hætta</button><button onclick="key('0')">0</button><button class="muted" onclick="del()">⌫</button></div>
    <div class="hint">Demo-kóði fyrir ${n.split(' ')[0]}: <b>${e[5]}</b> · (sést ekki í alvöru kerfi)</div>`;
  document.getElementById('ov').classList.add('show');
}
function dots(){let s='';for(let i=0;i<4;i++)s+=`<span class="dot ${i<PIN.length?'f':''}"></span>`;return s;}
function key(d){if(PIN.length>=4)return;PIN+=d;document.getElementById('dots').innerHTML=dots();if(PIN.length===4)setTimeout(check,140);}
function del(){PIN=PIN.slice(0,-1);document.getElementById('pinerr').textContent='';document.getElementById('dots').innerHTML=dots();}
function check(){const e=emp(CURN);if(PIN===e[5]){punch(CURN);}else{const d=document.getElementById('dots');d.classList.add('shake');document.getElementById('pinerr').textContent='Rangur kóði — reyndu aftur';setTimeout(()=>{PIN='';d.classList.remove('shake');d.innerHTML=dots();},650);}}
function closeOv(){document.getElementById('ov').classList.remove('show');}
function punch(n){
  const e=emp(n), wasOn=KST[n];
  KST[n]=!wasOn;
  const t=new Date(); const z=x=>String(x).padStart(2,'0'); const tm=`${z(t.getHours())}:${z(t.getMinutes())}`;
  if(KST[n]) KIN[n]=tm;
  closeOv(); render();
  const into = !wasOn;
  document.getElementById('flashc').innerHTML=`
    <div class="ring ${into?'in':'out'}"><svg viewBox="0 0 24 24" fill="none">${into?'<path d="M5 12.5l4 4 10-10"/>':'<path d="M6 6l12 12M18 6L6 18"/>'}</svg></div>
    <div class="ft">${n.split(' ')[0]} stimplaði ${into?'inn':'út'}</div>
    <div class="fs">kl. ${tm}${into?' · Góða vakt!':' · Takk fyrir daginn!'}</div>`;
  const f=document.getElementById('flash'); f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'),2100);
}
function tick(){const t=new Date(),z=x=>String(x).padStart(2,'0');document.getElementById('clock').textContent=`${z(t.getHours())}:${z(t.getMinutes())}:${z(t.getSeconds())}`;}
render(); tick(); setInterval(tick,1000);
</script>
</body>
</html>
